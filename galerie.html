    <script>
    // Build image lists per section (skip 01.jpg = logo image)
    var sections = {
        guede:  { count: 12, start: 2 },
        kretzer:{ count: 28, start: 2 },
        herder: { count: 16, start: 2 },
        becker: { count: 12, start: 2 },
        lvr:    { count: 8,  start: 2 },
    };
    var currentSection = '', currentIndex = 0;

    function getImages(sec) {
        var s = sections[sec], imgs = [];
        for (var i = s.start; i <= s.count; i++) {
            imgs.push('images/galerie/' + sec + '/' + (i<10?'0':'') + i + '.jpg');
        }
        return imgs;
    }

    function openLB(sec, idx) {
        currentSection = sec;
        currentIndex = idx;
        var imgs = getImages(sec);
        document.getElementById('lb-img').src = imgs[idx - 1]; // idx is 1-based offset from start
        document.getElementById('lb').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLB(e) {
        if (e.target.id === 'lb' || e.target.classList.contains('lb-close')) {
            document.getElementById('lb').classList.remove('active');
            document.body.style.overflow = '';
        }
    }

    function navLB(d) {
        var imgs = getImages(currentSection);
        currentIndex = ((currentIndex - 1 + d + imgs.length) % imgs.length) + 1;
        document.getElementById('lb-img').src = imgs[currentIndex - 1];
    }

    document.addEventListener('keydown', function(e) {
        if (!document.getElementById('lb').classList.contains('active')) return;
        if (e.key === 'Escape') { document.getElementById('lb').classList.remove('active'); document.body.style.overflow = ''; }
        if (e.key === 'ArrowLeft') navLB(-1);
        if (e.key === 'ArrowRight') navLB(1);
    });
    </script>
